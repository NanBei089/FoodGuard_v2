<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="980" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F4EC"/>
      <stop offset="1" stop-color="#F1E9DB"/>
    </linearGradient>
    <linearGradient id="trace" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#E76F51"/>
      <stop offset="1" stop-color="#2A9D8F"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#8C7B6B" flood-opacity="0.16"/>
    </filter>
    <style>
      .title { font: 700 34px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #1F2933; }
      .subtitle { font: 500 16px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #52606D; }
      .card-title { font: 700 18px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #102A43; }
      .card-text { font: 500 14px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #334E68; }
      .chip { font: 700 13px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #7C2D12; }
      .label { font: 700 14px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #0F172A; }
      .small { font: 500 12px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #486581; }
    </style>
  </defs>

  <rect width="1600" height="980" fill="url(#bg)"/>
  <rect x="38" y="34" width="1524" height="912" rx="28" fill="#FFFDF8" stroke="#E2D7C6" stroke-width="2"/>

  <text x="82" y="94" class="title">FoodGuard 后端分析链路</text>
  <text x="82" y="126" class="subtitle">当前实现对应关系：YOLO 命中时双 OCR 并行；YOLO 失败时只走全图 OCR 回退。</text>

  <g opacity="0.18">
    <path d="M64 174H1536" stroke="#C8B79F" stroke-width="2" stroke-dasharray="10 10"/>
    <path d="M64 516H1536" stroke="#C8B79F" stroke-width="2" stroke-dasharray="10 10"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="82" y="190" width="220" height="96" rx="20" fill="#FFF7ED" stroke="#E76F51" stroke-width="2"/>
    <text x="108" y="228" class="card-title">上传与入队</text>
    <text x="108" y="254" class="card-text">/analysis/upload</text>
    <text x="108" y="276" class="card-text">校验文件、写入 MinIO、创建任务</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="358" y="190" width="220" height="96" rx="20" fill="#FFF7ED" stroke="#F4A261" stroke-width="2"/>
    <text x="384" y="228" class="card-title">异步任务</text>
    <text x="384" y="254" class="card-text">Celery 队列 analysis</text>
    <text x="384" y="276" class="card-text">worker 拉取原图并预热能力</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="634" y="190" width="240" height="96" rx="20" fill="#F3FBF8" stroke="#2A9D8F" stroke-width="2"/>
    <text x="660" y="228" class="card-title">YOLO 定位</text>
    <text x="660" y="254" class="card-text">检测营养成分表 bbox</text>
    <text x="660" y="276" class="card-text">命中则裁剪并生成去表全图</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="938" y="170" width="280" height="132" rx="22" fill="#FFF2F0" stroke="#D64545" stroke-width="2"/>
    <rect x="960" y="188" width="74" height="26" rx="13" fill="#FDE8E8"/>
    <text x="978" y="205" class="chip">YOLO 失败</text>
    <text x="960" y="238" class="card-title">全图 OCR 回退</text>
    <text x="960" y="264" class="card-text">原图或压缩后全图</text>
    <text x="960" y="286" class="card-text">PaddleOCR-VL-1.5</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="938" y="392" width="280" height="132" rx="22" fill="#ECFDF5" stroke="#2A9D8F" stroke-width="2"/>
    <rect x="960" y="410" width="74" height="26" rx="13" fill="#D1FAE5"/>
    <text x="978" y="427" class="chip">YOLO 命中</text>
    <text x="960" y="460" class="card-title">双 OCR 并行</text>
    <text x="960" y="486" class="card-text">裁剪营养表图 + 去表后的全图</text>
    <text x="960" y="508" class="card-text">并发提交，降低总耗时</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1270" y="344" width="240" height="110" rx="20" fill="#F8FAFC" stroke="#2A9D8F" stroke-width="2"/>
    <text x="1294" y="382" class="card-title">营养表 OCR</text>
    <text x="1294" y="408" class="card-text">输入：cropped_image</text>
    <text x="1294" y="430" class="card-text">PP-StructureV3 / 结构化表格</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1270" y="486" width="240" height="110" rx="20" fill="#F8FAFC" stroke="#2A9D8F" stroke-width="2"/>
    <text x="1294" y="524" class="card-title">全图 OCR</text>
    <text x="1294" y="550" class="card-text">输入：masked_full_image</text>
    <text x="1294" y="572" class="card-text">PaddleOCR-VL-1.5 / 全文语义</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="938" y="620" width="280" height="152" rx="22" fill="#FFFDF6" stroke="#E9C46A" stroke-width="2"/>
    <text x="962" y="658" class="card-title">营养解析器</text>
    <text x="962" y="684" class="card-text">优先级：</text>
    <text x="962" y="706" class="card-text">1. table_recognition</text>
    <text x="962" y="728" class="card-text">2. ocr_text</text>
    <text x="962" y="750" class="card-text">3. llm_fallback</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1270" y="642" width="240" height="110" rx="20" fill="#FFFDF6" stroke="#E9C46A" stroke-width="2"/>
    <text x="1294" y="680" class="card-title">配料提取</text>
    <text x="1294" y="706" class="card-text">只依赖全图 OCR 文本</text>
    <text x="1294" y="728" class="card-text">规则优先，必要时 LLM 回退</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="938" y="806" width="280" height="96" rx="20" fill="#EEF4FF" stroke="#5B7CFA" stroke-width="2"/>
    <text x="962" y="844" class="card-title">RAG 检索</text>
    <text x="962" y="870" class="card-text">Chroma + embedding 补足成分知识</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1270" y="806" width="240" height="96" rx="20" fill="#EEF4FF" stroke="#5B7CFA" stroke-width="2"/>
    <text x="1294" y="844" class="card-title">LLM 生成报告</text>
    <text x="1294" y="870" class="card-text">DeepSeek + schema 校验 / repair</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="82" y="640" width="340" height="220" rx="24" fill="#FFF7FB" stroke="#B95FA9" stroke-width="2"/>
    <text x="112" y="684" class="card-title">状态与落库</text>
    <text x="112" y="716" class="card-text">analysis_tasks.status</text>
    <text x="112" y="738" class="card-text">pending -> processing -> completed / failed</text>
    <text x="112" y="772" class="card-text">reports 表保存：</text>
    <text x="112" y="794" class="card-text">nutrition_json / ingredients_text</text>
    <text x="112" y="816" class="card-text">rag_results_json / llm_output_json / score</text>
    <text x="112" y="850" class="card-text">前端轮询任务状态，完成后跳报告页</text>
  </g>

  <path d="M302 238H358" stroke="url(#trace)" stroke-width="6" stroke-linecap="round"/>
  <path d="M578 238H634" stroke="url(#trace)" stroke-width="6" stroke-linecap="round"/>

  <path d="M874 238H938" stroke="#D64545" stroke-width="6" stroke-linecap="round"/>
  <path d="M874 238C908 238 908 458 938 458" stroke="#2A9D8F" stroke-width="6" stroke-linecap="round"/>

  <path d="M1218 458H1270" stroke="#2A9D8F" stroke-width="6" stroke-linecap="round"/>
  <path d="M1218 458C1240 458 1240 399 1270 399" stroke="#2A9D8F" stroke-width="6" stroke-linecap="round"/>

  <path d="M1218 236C1252 236 1240 680 1270 680" stroke="#D64545" stroke-width="6" stroke-linecap="round"/>
  <path d="M1510 399C1540 399 1540 666 1218 666" stroke="#E9C46A" stroke-width="6" stroke-linecap="round"/>
  <path d="M1510 541C1530 541 1530 680 1510 680" stroke="#E9C46A" stroke-width="6" stroke-linecap="round"/>

  <path d="M1218 696H1270" stroke="#E9C46A" stroke-width="6" stroke-linecap="round"/>
  <path d="M1218 854H1270" stroke="#5B7CFA" stroke-width="6" stroke-linecap="round"/>
  <path d="M1510 696C1550 696 1550 854 1510 854" stroke="#5B7CFA" stroke-width="6" stroke-linecap="round"/>

  <path d="M1270 854H1218" stroke="#5B7CFA" stroke-width="6" stroke-linecap="round"/>
  <path d="M938 854C760 854 640 854 422 854" stroke="#8B5CF6" stroke-width="6" stroke-linecap="round"/>
  <path d="M1270 854C1040 918 770 918 422 860" stroke="#8B5CF6" stroke-width="4" stroke-linecap="round" stroke-dasharray="12 12"/>

  <circle cx="302" cy="238" r="8" fill="#E76F51"/>
  <circle cx="578" cy="238" r="8" fill="#F4A261"/>
  <circle cx="874" cy="238" r="8" fill="#2A9D8F"/>
  <circle cx="1218" cy="236" r="8" fill="#D64545"/>
  <circle cx="1218" cy="458" r="8" fill="#2A9D8F"/>
  <circle cx="1218" cy="666" r="8" fill="#E9C46A"/>
  <circle cx="1218" cy="854" r="8" fill="#5B7CFA"/>

  <text x="90" y="924" class="small">分支规则：YOLO 命中时，营养表从裁剪图走 OCR，配料与全文语义从去表后的全图走 OCR；YOLO 失败时，整条链路降级为全图 OCR + 文本回退解析。</text>
</svg>
