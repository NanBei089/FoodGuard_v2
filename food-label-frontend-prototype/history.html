<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>分析历史记录 - FoodGuard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    * { font-family: 'Inter', system-ui, sans-serif; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased min-h-screen flex flex-col">

  <!-- Navigation -->
  <nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6">
      <div class="flex items-center justify-between h-16">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 bg-gradient-to-br from-emerald-400 to-emerald-600 rounded-xl flex items-center justify-center shadow-lg shadow-emerald-500/30">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
            </svg>
          </div>
          <span class="text-xl font-bold text-slate-900">FoodGuard</span>
        </div>
        <div class="hidden md:flex items-center gap-6">
          <a href="home.html" class="text-slate-600 hover:text-emerald-600 transition-colors font-medium text-sm">首页</a>
          <a href="index.html" class="text-slate-600 hover:text-emerald-600 transition-colors font-medium text-sm">分析报告</a>
          <a href="#" class="text-emerald-600 font-semibold text-sm">历史记录</a>
        </div>
        <div class="flex items-center gap-4">
          <a href="profile.html" class="w-8 h-8 bg-slate-200 rounded-full flex items-center justify-center hover:ring-2 hover:ring-emerald-500 hover:ring-offset-2 transition-all">
            <span class="text-sm font-medium text-slate-600">李</span>
          </a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="flex-1 max-w-7xl mx-auto w-full px-6 py-8">
    
    <!-- Page Header & Filters -->
    <div class="mb-8 flex flex-col md:flex-row md:items-end justify-between gap-4">
      <div>
        <h1 class="text-2xl font-bold text-slate-900">分析历史记录</h1>
        <p class="text-slate-500 text-sm mt-1">查看和管理您过往的食品标签分析报告</p>
      </div>
      
      <div class="flex items-center gap-3">
        <!-- Search -->
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          </div>
          <input type="text" placeholder="搜索食品名称..." class="pl-9 pr-4 py-2 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 w-full md:w-64">
        </div>
        <!-- Filter Button -->
        <button class="p-2 border border-slate-200 text-slate-600 rounded-xl hover:bg-slate-50 transition-colors flex items-center gap-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"/></svg>
          <span class="text-sm font-medium hidden sm:inline">筛选</span>
        </button>
      </div>
    </div>

    <!-- History List (Table View) -->
    <div class="bg-white border border-slate-200 rounded-2xl overflow-hidden shadow-sm">
      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="bg-slate-50 border-b border-slate-200 text-sm font-semibold text-slate-600">
              <th class="py-4 px-6">食品信息</th>
              <th class="py-4 px-6">健康评分</th>
              <th class="py-4 px-6 hidden md:table-cell">核心风险</th>
              <th class="py-4 px-6 hidden sm:table-cell">分析时间</th>
              <th class="py-4 px-6 text-right">操作</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-slate-100">
            
            <!-- Item 1 -->
            <tr class="hover:bg-slate-50 transition-colors group cursor-pointer" onclick="window.location.href='index.html'">
              <td class="py-4 px-6">
                <div class="flex items-center gap-4">
                  <div class="w-12 h-12 rounded-lg overflow-hidden bg-slate-100 flex-shrink-0">
                    <img src="https://images.unsplash.com/photo-1622483767028-3f66f32aef97?w=100&h=100&fit=crop" class="w-full h-full object-cover" alt="封面">
                  </div>
                  <div>
                    <div class="font-bold text-slate-900 group-hover:text-emerald-600 transition-colors">某品牌全麦饼干</div>
                  </div>
                </div>
              </td>
              <td class="py-4 px-6">
                <div class="flex items-center gap-2">
                  <div class="w-8 h-8 rounded-full border-2 border-emerald-500 flex items-center justify-center">
                    <span class="text-xs font-bold text-emerald-600">75</span>
                  </div>
                  <span class="text-xs font-medium px-2 py-0.5 bg-amber-100 text-amber-800 rounded">中低风险</span>
                </div>
              </td>
              <td class="py-4 px-6 hidden md:table-cell">
                <div class="flex flex-wrap gap-1">
                  <span class="text-xs border border-slate-200 text-slate-600 px-2 py-1 rounded-md">钠含量高</span>
                  <span class="text-xs border border-slate-200 text-slate-600 px-2 py-1 rounded-md">含代糖</span>
                </div>
              </td>
              <td class="py-4 px-6 hidden sm:table-cell text-sm text-slate-500">
                今天 14:30
              </td>
              <td class="py-4 px-6 text-right">
                <div class="flex items-center justify-end gap-3">
                  <button class="flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium text-emerald-600 bg-emerald-50 hover:bg-emerald-100 rounded-lg transition-colors" onclick="event.stopPropagation(); window.location.href='index.html'">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                    查看详情
                  </button>
                  <button class="flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium text-slate-500 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors" onclick="event.stopPropagation();">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                    删除
                  </button>
                </div>
              </td>
            </tr>

            <!-- Item 2 -->
            <tr class="hover:bg-slate-50 transition-colors group cursor-pointer">
              <td class="py-4 px-6">
                <div class="flex items-center gap-4">
                  <div class="w-12 h-12 rounded-lg overflow-hidden bg-slate-100 flex-shrink-0">
                    <img src="https://images.unsplash.com/photo-1550426735-c33c7cc41334?w=100&h=100&fit=crop" class="w-full h-full object-cover" alt="封面">
                  </div>
                  <div>
                    <div class="font-bold text-slate-900 group-hover:text-emerald-600 transition-colors">气泡苏打水 (白桃味)</div>
                  </div>
                </div>
              </td>
              <td class="py-4 px-6">
                <div class="flex items-center gap-2">
                  <div class="w-8 h-8 rounded-full border-2 border-emerald-500 flex items-center justify-center">
                    <span class="text-xs font-bold text-emerald-600">92</span>
                  </div>
                  <span class="text-xs font-medium px-2 py-0.5 bg-emerald-100 text-emerald-800 rounded">健康安全</span>
                </div>
              </td>
              <td class="py-4 px-6 hidden md:table-cell">
                <div class="text-xs text-slate-400 italic">无明显风险项</div>
              </td>
              <td class="py-4 px-6 hidden sm:table-cell text-sm text-slate-500">
                昨天 09:15
              </td>
              <td class="py-4 px-6 text-right">
                <div class="flex items-center justify-end gap-3">
                  <button class="flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium text-emerald-600 bg-emerald-50 hover:bg-emerald-100 rounded-lg transition-colors" onclick="event.stopPropagation(); window.location.href='index.html'">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                    查看详情
                  </button>
                  <button class="flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium text-slate-500 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors" onclick="event.stopPropagation();">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                    删除
                  </button>
                </div>
              </td>
            </tr>

            <!-- Item 3 -->
            <tr class="hover:bg-slate-50 transition-colors group cursor-pointer">
              <td class="py-4 px-6">
                <div class="flex items-center gap-4">
                  <div class="w-12 h-12 rounded-lg overflow-hidden bg-slate-100 flex-shrink-0">
                    <img src="https://images.unsplash.com/photo-1600880292203-757bb62b4baf?w=100&h=100&fit=crop" class="w-full h-full object-cover" alt="封面">
                  </div>
                  <div>
                    <div class="font-bold text-slate-900 group-hover:text-emerald-600 transition-colors">网红魔芋爽辣条</div>
                  </div>
                </div>
              </td>
              <td class="py-4 px-6">
                <div class="flex items-center gap-2">
                  <div class="w-8 h-8 rounded-full border-2 border-red-500 flex items-center justify-center">
                    <span class="text-xs font-bold text-red-600">35</span>
                  </div>
                  <span class="text-xs font-medium px-2 py-0.5 bg-red-100 text-red-800 rounded">高风险</span>
                </div>
              </td>
              <td class="py-4 px-6 hidden md:table-cell">
                <div class="flex flex-wrap gap-1">
                  <span class="text-xs border border-red-200 bg-red-50 text-red-700 px-2 py-1 rounded-md">钠严重超标</span>
                  <span class="text-xs border border-slate-200 text-slate-600 px-2 py-1 rounded-md">防腐剂多</span>
                  <span class="text-xs border border-slate-200 text-slate-600 px-2 py-1 rounded-md">反式脂肪</span>
                </div>
              </td>
              <td class="py-4 px-6 hidden sm:table-cell text-sm text-slate-500">
                2026-03-24
              </td>
              <td class="py-4 px-6 text-right">
                <div class="flex items-center justify-end gap-3">
                  <button class="flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium text-emerald-600 bg-emerald-50 hover:bg-emerald-100 rounded-lg transition-colors" onclick="event.stopPropagation(); window.location.href='index.html'">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                    查看详情
                  </button>
                  <button class="flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium text-slate-500 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors" onclick="event.stopPropagation();">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                    删除
                  </button>
                </div>
              </td>
            </tr>

          </tbody>
        </table>
      </div>
      
      <!-- Pagination -->
      <div class="bg-slate-50 border-t border-slate-200 p-4 flex items-center justify-between">
        <span class="text-sm text-slate-500">共 24 条记录</span>
        <div class="flex items-center gap-1">
          <button class="p-1.5 rounded-lg border border-slate-200 text-slate-400 hover:bg-white disabled:opacity-50" disabled>
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
          </button>
          <button class="w-8 h-8 rounded-lg bg-emerald-500 text-white text-sm font-medium">1</button>
          <button class="w-8 h-8 rounded-lg hover:bg-slate-200 text-slate-600 text-sm font-medium transition-colors">2</button>
          <button class="w-8 h-8 rounded-lg hover:bg-slate-200 text-slate-600 text-sm font-medium transition-colors">3</button>
          <span class="px-1 text-slate-400">...</span>
          <button class="p-1.5 rounded-lg border border-slate-200 text-slate-600 hover:bg-white transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
          </button>
        </div>
      </div>
    </div>

  </main>

</body>
</html>
