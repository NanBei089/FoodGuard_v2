<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>食品标签智能分析系统 - 首页原型</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
          animation: {
            'blob': 'blob 7s infinite',
          },
          keyframes: {
            blob: {
              '0%': { transform: 'translate(0px, 0px) scale(1)' },
              '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
              '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
              '100%': { transform: 'translate(0px, 0px) scale(1)' },
            }
          }
        }
      }
    }
  </script>
  <style>
    * { font-family: 'Inter', system-ui, sans-serif; }
    .glass-panel {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.5);
    }
    .file-drop-zone {
      border: 2px dashed #cbd5e1;
      transition: all 0.3s ease;
    }
    .file-drop-zone:hover {
      border-color: #10b981;
      background-color: rgba(16, 185, 129, 0.05);
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased min-h-screen flex flex-col relative overflow-x-hidden">

  <!-- Background Decorative Blobs -->
  <div class="fixed inset-0 w-full h-full overflow-hidden -z-10 pointer-events-none">
    <div class="absolute top-0 left-1/4 w-96 h-96 bg-emerald-300/20 rounded-full mix-blend-multiply filter blur-3xl opacity-70 animate-blob"></div>
    <div class="absolute top-0 right-1/4 w-96 h-96 bg-cyan-300/20 rounded-full mix-blend-multiply filter blur-3xl opacity-70 animate-blob animation-delay-2000"></div>
    <div class="absolute -bottom-32 left-1/3 w-96 h-96 bg-teal-300/20 rounded-full mix-blend-multiply filter blur-3xl opacity-70 animate-blob animation-delay-4000"></div>
  </div>

  <!-- Navigation -->
  <nav class="glass-panel sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6">
      <div class="flex items-center justify-between h-16">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 bg-gradient-to-br from-emerald-400 to-emerald-600 rounded-xl flex items-center justify-center shadow-lg shadow-emerald-500/30">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
            </svg>
          </div>
          <span class="text-xl font-bold text-slate-900">FoodGuard</span>
        </div>
        <div class="hidden md:flex items-center gap-6">
          <a href="#" class="text-emerald-600 font-semibold text-sm">首页</a>
          <a href="index.html" class="text-slate-600 hover:text-emerald-600 transition-colors font-medium text-sm">分析报告</a>
          <a href="history.html" class="text-slate-600 hover:text-emerald-600 transition-colors font-medium text-sm">历史记录</a>
        </div>
        <div class="flex items-center gap-4">
          <a href="profile.html" class="w-8 h-8 bg-slate-200 rounded-full flex items-center justify-center hover:ring-2 hover:ring-emerald-500 hover:ring-offset-2 transition-all">
            <span class="text-sm font-medium text-slate-600">李</span>
          </a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="flex-1 flex flex-col items-center justify-center p-6 relative z-10 w-full max-w-5xl mx-auto mt-12 mb-20">
    
    <!-- Hero Header -->
    <div class="text-center mb-12 max-w-3xl">
      <h1 class="text-4xl md:text-5xl lg:text-6xl font-extrabold text-slate-900 tracking-tight mb-6 leading-tight">
        看透食品标签，<br/>
        <span class="text-transparent bg-clip-text bg-gradient-to-r from-emerald-500 to-teal-400">吃得更明白、更健康</span>
      </h1>
      <p class="text-lg text-slate-600 mb-8 max-w-2xl mx-auto leading-relaxed">
        只需上传食品配料表和营养成分表照片，AI 立即为您解析隐藏的健康风险、提供个性化食用建议。
      </p>
    </div>

    <!-- Upload & Action Area -->
    <div class="w-full max-w-3xl bg-white/80 backdrop-blur-xl rounded-3xl shadow-xl shadow-slate-200/50 border border-white p-2 mb-16">
      <a href="upload-preview.html" class="block bg-white rounded-2xl p-8 file-drop-zone flex flex-col items-center justify-center text-center cursor-pointer min-h-[280px]">
        <div class="w-20 h-20 bg-emerald-50 rounded-full flex items-center justify-center mb-6 group-hover:scale-110 transition-transform duration-300">
          <svg class="w-10 h-10 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
          </svg>
        </div>
        <h3 class="text-xl font-bold text-slate-900 mb-2">点击上传 或 拖拽图片至此处</h3>
        <p class="text-sm text-slate-500 mb-6">支持配料表、营养成分表照片 (JPG, PNG, WEBP)</p>
      </a>
    </div>

  </main>

  <!-- Footer -->
  <footer class="border-t border-slate-200/60 bg-white/50 backdrop-blur-md py-8 mt-auto relative z-10">
    <div class="max-w-7xl mx-auto px-6 text-center flex flex-col md:flex-row items-center justify-between gap-4">
      <div class="flex items-center gap-2">
        <div class="w-6 h-6 bg-emerald-500 rounded flex items-center justify-center">
          <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
          </svg>
        </div>
        <span class="font-bold text-slate-900">FoodGuard</span>
      </div>
      <p class="text-slate-400 text-sm">© 2026 FoodGuard. 智能食品标签分析系统。</p>
      <div class="flex gap-4">
        <a href="#" class="text-slate-400 hover:text-emerald-500 transition-colors text-sm">关于我们</a>
        <a href="#" class="text-slate-400 hover:text-emerald-500 transition-colors text-sm">隐私政策</a>
        <a href="#" class="text-slate-400 hover:text-emerald-500 transition-colors text-sm">使用条款</a>
      </div>
    </div>
  </footer>

</body>
</html>
