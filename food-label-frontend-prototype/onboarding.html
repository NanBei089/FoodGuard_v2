<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>欢迎 - 个性化设置 - FoodGuard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    * { font-family: 'Inter', system-ui, sans-serif; }
    .bg-pattern {
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%2310b981' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }
    /* Custom Scrollbar for better UI experience */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(241, 245, 249, 0.5); /* slate-100 with opacity */
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1; /* slate-300 */
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8; /* slate-400 */
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased min-h-screen flex items-center justify-center relative bg-pattern py-10">

  <!-- Decorative Blobs -->
  <div class="fixed top-[-10%] right-[-10%] w-[500px] h-[500px] bg-emerald-300/20 rounded-full mix-blend-multiply filter blur-3xl opacity-70"></div>
  <div class="fixed bottom-[-10%] left-[-10%] w-[500px] h-[500px] bg-cyan-300/20 rounded-full mix-blend-multiply filter blur-3xl opacity-70"></div>

  <div class="w-full max-w-2xl px-6 relative z-10">
    
    <!-- Header -->
    <div class="text-center mb-10">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-white rounded-full shadow-md mb-6 border border-emerald-100">
        <span class="text-3xl">🎉</span>
      </div>
      <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight mb-3">欢迎加入 FoodGuard</h1>
      <p class="text-lg text-slate-600">为了给您提供更精准的健康分析，请花 1 分钟完成个性化设置。</p>
    </div>

    <!-- Onboarding Card -->
    <div class="bg-white/90 backdrop-blur-xl border border-white rounded-3xl p-8 shadow-xl shadow-slate-200/50">
      <form action="home.html" class="space-y-8">
        
        <!-- Basic Info -->
        <div>
          <h2 class="text-lg font-bold text-slate-900 mb-4 flex items-center gap-2">
            <span class="w-6 h-6 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center text-sm">1</span>
            基本信息
          </h2>
          <div class="space-y-4 ml-8">
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-2">您怎么称呼？</label>
              <input type="text" placeholder="例如：李雷" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white transition-all">
            </div>
          </div>
        </div>

        <hr class="border-slate-100">

        <!-- Family/Focus Groups -->
        <div>
          <h2 class="text-lg font-bold text-slate-900 mb-4 flex items-center gap-2">
            <span class="w-6 h-6 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center text-sm">2</span>
            您通常为谁购买食品？ <span class="text-sm font-normal text-slate-400">(多选)</span>
          </h2>
          <div class="ml-8 grid grid-cols-2 sm:grid-cols-3 gap-4">
            <label class="cursor-pointer group">
              <input type="checkbox" class="peer sr-only">
              <div class="flex flex-col items-center justify-center p-4 rounded-2xl border-2 border-slate-100 bg-slate-50/50 text-slate-500 peer-checked:bg-emerald-500 peer-checked:border-emerald-500 peer-checked:text-white hover:border-emerald-200 hover:bg-emerald-50/50 transition-all duration-300">
                <span class="text-3xl mb-2 group-hover:scale-110 transition-transform">🧑</span>
                <span class="text-sm font-bold">自己 / 成年人</span>
              </div>
            </label>
            <label class="cursor-pointer group">
              <input type="checkbox" class="peer sr-only">
              <div class="flex flex-col items-center justify-center p-4 rounded-2xl border-2 border-slate-100 bg-slate-50/50 text-slate-500 peer-checked:bg-emerald-500 peer-checked:border-emerald-500 peer-checked:text-white hover:border-emerald-200 hover:bg-emerald-50/50 transition-all duration-300">
                <span class="text-3xl mb-2 group-hover:scale-110 transition-transform">👶</span>
                <span class="text-sm font-bold">儿童</span>
              </div>
            </label>
            <label class="cursor-pointer group">
              <input type="checkbox" class="peer sr-only">
              <div class="flex flex-col items-center justify-center p-4 rounded-2xl border-2 border-slate-100 bg-slate-50/50 text-slate-500 peer-checked:bg-emerald-500 peer-checked:border-emerald-500 peer-checked:text-white hover:border-emerald-200 hover:bg-emerald-50/50 transition-all duration-300">
                <span class="text-3xl mb-2 group-hover:scale-110 transition-transform">👴</span>
                <span class="text-sm font-bold">老年人</span>
              </div>
            </label>
            <label class="cursor-pointer group">
              <input type="checkbox" class="peer sr-only">
              <div class="flex flex-col items-center justify-center p-4 rounded-2xl border-2 border-slate-100 bg-slate-50/50 text-slate-500 peer-checked:bg-emerald-500 peer-checked:border-emerald-500 peer-checked:text-white hover:border-emerald-200 hover:bg-emerald-50/50 transition-all duration-300">
                <span class="text-3xl mb-2 group-hover:scale-110 transition-transform">🤰</span>
                <span class="text-sm font-bold">孕妇</span>
              </div>
            </label>
            <label class="cursor-pointer group">
              <input type="checkbox" class="peer sr-only">
              <div class="flex flex-col items-center justify-center p-4 rounded-2xl border-2 border-slate-100 bg-slate-50/50 text-slate-500 peer-checked:bg-emerald-500 peer-checked:border-emerald-500 peer-checked:text-white hover:border-emerald-200 hover:bg-emerald-50/50 transition-all duration-300">
                <span class="text-3xl mb-2 group-hover:scale-110 transition-transform">🏃</span>
                <span class="text-sm font-bold">健身 / 减脂</span>
              </div>
            </label>
          </div>
        </div>

        <hr class="border-slate-100">

        <!-- Special Health Concerns -->
        <div>
          <h2 class="text-lg font-bold text-slate-900 mb-4 flex items-center gap-2">
            <span class="w-6 h-6 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center text-sm">3</span>
            有需要特别关注的健康状况吗？ <span class="text-sm font-normal text-slate-400">(可选)</span>
          </h2>
          <div class="ml-8 grid grid-cols-1 sm:grid-cols-2 gap-4">
            <label class="flex items-start gap-3 p-4 border-2 border-slate-100 bg-white rounded-xl cursor-pointer hover:border-slate-200 transition-all relative">
              <input type="checkbox" class="mt-1 w-4 h-4 text-emerald-600 border-slate-300 rounded focus:ring-emerald-500 absolute top-4 right-4">
              <div>
                <div class="font-bold text-slate-900 mb-1">糖尿病 / 控糖</div>
                <div class="text-xs text-slate-500">重点预警游离糖、隐形糖及高升糖配料。</div>
              </div>
            </label>
            <label class="flex items-start gap-3 p-4 border-2 border-slate-100 bg-white rounded-xl cursor-pointer hover:border-slate-200 transition-all relative">
              <input type="checkbox" class="mt-1 w-4 h-4 text-emerald-600 border-slate-300 rounded focus:ring-emerald-500 absolute top-4 right-4">
              <div>
                <div class="font-bold text-slate-900 mb-1">高血压 / 控钠</div>
                <div class="text-xs text-slate-500">重点监控钠含量及隐形盐分。</div>
              </div>
            </label>
            <label class="flex items-start gap-3 p-4 border-2 border-slate-100 bg-white rounded-xl cursor-pointer hover:border-slate-200 transition-all relative">
              <input type="checkbox" class="mt-1 w-4 h-4 text-emerald-600 border-slate-300 rounded focus:ring-emerald-500 absolute top-4 right-4">
              <div>
                <div class="font-bold text-slate-900 mb-1">高尿酸 / 痛风</div>
                <div class="text-xs text-slate-500">排查果葡糖浆等易引发尿酸升高的成分。</div>
              </div>
            </label>
            <div class="relative p-4 border-2 border-slate-100 bg-white rounded-xl transition-all" id="allergy-container">
              <label class="flex items-start gap-3 cursor-pointer pr-10">
                <input type="checkbox" id="allergy-checkbox" class="mt-1 w-4 h-4 text-emerald-600 border-slate-300 rounded focus:ring-emerald-500 absolute top-4 right-4">
                <div class="flex-1">
                  <div class="font-bold text-slate-900 mb-1">食物过敏</div>
                  <div class="text-xs text-slate-500">填写后，会在分析报告中优先标记可能的致敏成分。</div>
                </div>
              </label>
              <div id="allergy-input-wrapper" class="hidden mt-3 pt-3 border-t border-slate-100">
                <label class="block text-xs font-semibold text-slate-700 mb-2">过敏源</label>
                <input id="allergy-input" type="text" placeholder="如：花生, 牛奶, 麸质, 虾蟹" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white transition-all">
                <div class="text-[11px] text-slate-500 mt-2">支持逗号分隔多个过敏源</div>
              </div>
            </div>
          </div>
        </div>

        <!-- Submit Buttons -->
        <div class="flex items-center gap-4 pt-4 ml-8">
          <a href="home.html" class="px-6 py-3.5 bg-slate-100 text-slate-600 font-medium rounded-xl hover:bg-slate-200 transition-colors">
            跳过，以后再设
          </a>
          <button type="submit" class="flex-1 py-3.5 bg-emerald-500 hover:bg-emerald-600 text-white font-bold rounded-xl shadow-lg shadow-emerald-500/30 transition-all flex items-center justify-center gap-2">
            完成设置，开启健康之旅
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
          </button>
        </div>

      </form>
    </div>

  </div>

  <script>
    document.querySelectorAll('input[type="checkbox"]').forEach(checkbox => {
      checkbox.addEventListener('change', function() {
        const parentLabel = this.closest('label');
        if (parentLabel && parentLabel.classList.contains('border-2')) {
          if (this.checked) {
            parentLabel.classList.remove('border-slate-100');
            parentLabel.classList.add('border-emerald-500', 'bg-emerald-50');
          } else {
            parentLabel.classList.add('border-slate-100');
            parentLabel.classList.remove('border-emerald-500', 'bg-emerald-50');
          }
        }
      });
    });

    const allergyCheckbox = document.getElementById('allergy-checkbox');
    const allergyContainer = document.getElementById('allergy-container');
    const allergyInputWrapper = document.getElementById('allergy-input-wrapper');
    const allergyInput = document.getElementById('allergy-input');

    function syncAllergyState() {
      if (!allergyCheckbox) return;
      const checked = allergyCheckbox.checked;
      allergyContainer.classList.toggle('border-emerald-500', checked);
      allergyContainer.classList.toggle('bg-emerald-50', checked);
      allergyContainer.classList.toggle('border-slate-100', !checked);
      allergyInputWrapper.classList.toggle('hidden', !checked);
      if (allergyInput) {
        allergyInput.required = checked;
      }
      if (checked) {
        setTimeout(() => allergyInput && allergyInput.focus(), 100);
      }
    }

    if (allergyCheckbox) {
      allergyCheckbox.addEventListener('change', syncAllergyState);
      syncAllergyState();
    }
  </script>
</body>
</html>
