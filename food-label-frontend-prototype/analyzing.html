<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>正在分析... - FoodGuard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
          animation: {
            'scan': 'scan 2s linear infinite',
            'pulse-fast': 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          },
          keyframes: {
            scan: {
              '0%': { transform: 'translateY(-100%)' },
              '100%': { transform: 'translateY(100%)' }
            }
          }
        }
      }
    }
  </script>
  <style>
    * { font-family: 'Inter', system-ui, sans-serif; }
    
    .scanner-line {
      background: linear-gradient(to bottom, transparent, rgba(16, 185, 129, 0.8), transparent);
      height: 20%;
      width: 100%;
      position: absolute;
      left: 0;
      top: 0;
    }
    
    .progress-bar-fill {
      transition: width 0.5s ease-out;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased min-h-screen flex flex-col items-center justify-center p-6">

  <div class="max-w-md w-full bg-white rounded-3xl border border-slate-200 p-8 shadow-xl text-center relative overflow-hidden">
    <!-- Decorative background glow -->
    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-64 h-64 bg-emerald-400/10 rounded-full blur-3xl -z-10"></div>
    
    <div class="mb-8">
      <!-- Image with Scanning Effect -->
      <div class="w-48 h-48 mx-auto bg-slate-100 rounded-2xl overflow-hidden relative shadow-inner border border-slate-200">
        <img src="https://images.unsplash.com/photo-1622483767028-3f66f32aef97?w=400&q=80" alt="Scanning" class="w-full h-full object-cover opacity-60">
        
        <!-- Scanner Overlay -->
        <div class="absolute inset-0 border-2 border-emerald-500/50 rounded-2xl z-20"></div>
        <div class="scanner-line animate-scan z-10"></div>
        
        <!-- OCR target boxes simulation -->
        <div class="absolute top-[20%] left-[10%] w-[80%] h-[10%] border border-emerald-400/80 bg-emerald-400/10 rounded"></div>
        <div class="absolute top-[40%] left-[10%] w-[60%] h-[8%] border border-emerald-400/80 bg-emerald-400/10 rounded"></div>
        <div class="absolute top-[60%] left-[10%] w-[70%] h-[12%] border border-emerald-400/80 bg-emerald-400/10 rounded"></div>
      </div>
    </div>

    <h2 class="text-2xl font-bold text-slate-900 mb-2">AI 正在深度解析</h2>
    <p class="text-sm text-slate-500 mb-8 h-5" id="status-text">正在识别配料表文字...</p>

    <!-- Progress Bar -->
    <div class="w-full bg-slate-100 rounded-full h-3 mb-2 overflow-hidden relative">
      <div class="bg-emerald-500 h-full rounded-full progress-bar-fill relative" style="width: 35%" id="progress-bar">
        <!-- Shimmer effect on progress bar -->
        <div class="absolute top-0 left-0 right-0 bottom-0 bg-gradient-to-r from-transparent via-white/40 to-transparent animate-[pulse_2s_linear_infinite]"></div>
      </div>
    </div>
    <div class="flex justify-between text-xs text-slate-400 font-medium">
      <span>0%</span>
      <span id="progress-text" class="text-emerald-600">35%</span>
      <span>100%</span>
    </div>

    <!-- Steps Status -->
    <div class="mt-8 text-left space-y-4">
      
      <div class="flex items-center gap-3 opacity-50 transition-opacity duration-300" id="step-1">
        <div class="w-6 h-6 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center flex-shrink-0">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
        </div>
        <span class="text-sm font-medium text-slate-700">图片预处理与增强</span>
      </div>

      <div class="flex items-center gap-3" id="step-2">
        <div class="w-6 h-6 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center flex-shrink-0 animate-pulse-fast">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
        </div>
        <span class="text-sm font-bold text-slate-900">执行 OCR 文字识别</span>
      </div>

      <div class="flex items-center gap-3 opacity-40" id="step-3">
        <div class="w-6 h-6 rounded-full border-2 border-slate-200 text-slate-400 flex items-center justify-center flex-shrink-0">
          <span class="text-xs">3</span>
        </div>
        <span class="text-sm font-medium text-slate-500">大模型成分风险评估</span>
      </div>

      <div class="flex items-center gap-3 opacity-40" id="step-4">
        <div class="w-6 h-6 rounded-full border-2 border-slate-200 text-slate-400 flex items-center justify-center flex-shrink-0">
          <span class="text-xs">4</span>
        </div>
        <span class="text-sm font-medium text-slate-500">生成个性化健康报告</span>
      </div>

    </div>
  </div>

  <!-- Simulation Script for Demo Purposes -->
  <script>
    // This script just simulates the loading process to show the UI states
    setTimeout(() => {
      document.getElementById('progress-bar').style.width = '65%';
      document.getElementById('progress-text').innerText = '65%';
      document.getElementById('status-text').innerText = '正在对比 FDA 健康数据库...';
      
      // Update steps UI
      document.getElementById('step-2').innerHTML = '<div class="w-6 h-6 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center flex-shrink-0"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg></div><span class="text-sm font-medium text-slate-700">执行 OCR 文字识别</span>';
      document.getElementById('step-2').classList.add('opacity-50');
      
      document.getElementById('step-3').innerHTML = '<div class="w-6 h-6 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center flex-shrink-0 animate-pulse-fast"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg></div><span class="text-sm font-bold text-slate-900">大模型成分风险评估</span>';
      document.getElementById('step-3').classList.remove('opacity-40');
    }, 2500);

    setTimeout(() => {
      document.getElementById('progress-bar').style.width = '90%';
      document.getElementById('progress-text').innerText = '90%';
      document.getElementById('status-text').innerText = '正在生成可视化图表...';
      
      document.getElementById('step-3').innerHTML = '<div class="w-6 h-6 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center flex-shrink-0"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg></div><span class="text-sm font-medium text-slate-700">大模型成分风险评估</span>';
      document.getElementById('step-3').classList.add('opacity-50');
      
      document.getElementById('step-4').innerHTML = '<div class="w-6 h-6 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center flex-shrink-0 animate-pulse-fast"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg></div><span class="text-sm font-bold text-slate-900">生成个性化健康报告</span>';
      document.getElementById('step-4').classList.remove('opacity-40');
    }, 5000);

    setTimeout(() => {
      document.getElementById('progress-bar').style.width = '100%';
      document.getElementById('progress-text').innerText = '100%';
      document.getElementById('status-text').innerText = '分析完成，即将跳转...';
      
      // Simulate redirect to index.html
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 1000);
    }, 7000);
  </script>
</body>
</html>
