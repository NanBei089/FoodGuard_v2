<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>上传预览与分析 - FoodGuard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    * { font-family: 'Inter', system-ui, sans-serif; }
    .glass-panel {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.5);
    }
    
    /* Crop/Select box simulation */
    .crop-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: 10;
    }
    .crop-window {
      position: absolute;
      top: 15%;
      left: 10%;
      right: 10%;
      bottom: 25%;
      box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.5);
      border: 2px solid #10b981;
      z-index: 20;
    }
    .crop-corner {
      position: absolute;
      width: 12px;
      height: 12px;
      background: white;
      border: 2px solid #10b981;
      border-radius: 50%;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased min-h-screen flex flex-col relative">

  <!-- Navigation -->
  <nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6">
      <div class="flex items-center justify-between h-16">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 bg-gradient-to-br from-emerald-400 to-emerald-600 rounded-xl flex items-center justify-center shadow-lg shadow-emerald-500/30">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
            </svg>
          </div>
          <span class="text-xl font-bold text-slate-900">FoodGuard</span>
        </div>
        <div class="flex items-center gap-4">
          <a href="home.html" class="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-semibold rounded-lg flex items-center gap-1.5 transition-colors border border-slate-200 shadow-sm">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            取消并返回
          </a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Main Content - Upload Preview & Setup -->
  <main class="flex-1 max-w-5xl mx-auto w-full px-6 py-8">
    
    <div class="mb-6">
      <h1 class="text-2xl font-bold text-slate-900">确认图片并开始分析</h1>
      <p class="text-slate-500 text-sm mt-1">请确保配料表和营养成分表清晰可见。您可以拖动选框裁剪多余部分以提高识别准确率。</p>
    </div>

    <div class="flex flex-col lg:flex-row gap-8">
      
      <!-- Left: Image Preview & Cropper -->
      <div class="flex-1 bg-white rounded-2xl border border-slate-200 p-4 shadow-sm flex flex-col">
        <div class="relative w-full bg-slate-100 rounded-xl overflow-hidden flex items-center justify-center min-h-[400px]">
          <!-- The uploaded image -->
          <img src="https://images.unsplash.com/photo-1622483767028-3f66f32aef97?w=800&q=80" alt="Uploaded label" class="max-w-full max-h-[600px] object-contain">
          
          <!-- Cropper Simulation Overlay -->
          <div class="crop-window">
            <div class="crop-corner -top-1.5 -left-1.5 cursor-nwse-resize"></div>
            <div class="crop-corner -top-1.5 -right-1.5 cursor-nesw-resize"></div>
            <div class="crop-corner -bottom-1.5 -left-1.5 cursor-nesw-resize"></div>
            <div class="crop-corner -bottom-1.5 -right-1.5 cursor-nwse-resize"></div>
            <!-- Grid lines for cropper -->
            <div class="absolute inset-0 border border-white/30 pointer-events-none">
              <div class="absolute top-1/3 left-0 right-0 border-t border-white/30"></div>
              <div class="absolute top-2/3 left-0 right-0 border-t border-white/30"></div>
              <div class="absolute left-1/3 top-0 bottom-0 border-l border-white/30"></div>
              <div class="absolute left-2/3 top-0 bottom-0 border-l border-white/30"></div>
            </div>
          </div>
        </div>

        <div class="flex justify-between items-center mt-4 px-2">
          <div class="flex gap-2">
            <button class="p-2 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-lg transition-colors" title="向左旋转">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"/></svg>
            </button>
            <button class="p-2 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-lg transition-colors" title="向右旋转">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 10h-10a8 8 0 00-8 8v2M21 10l-6 6m6-6l-6-6"/></svg>
            </button>
          </div>
          <button class="text-sm font-medium text-emerald-600 hover:text-emerald-700">重新上传图片</button>
        </div>
      </div>

      <!-- Right: Settings & Actions -->
      <div class="w-full lg:w-80 flex flex-col gap-6">
        
        <!-- Analysis Settings -->
        <div class="bg-white rounded-2xl border border-slate-200 p-6 shadow-sm">
          <h3 class="font-bold text-slate-900 mb-4 flex items-center gap-2">
            <svg class="w-5 h-5 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            分析偏好设置
          </h3>
          
          <div class="space-y-4">
            <!-- Focus Groups -->
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-2">特别关注人群 (可选)</label>
              <div class="flex flex-wrap gap-2">
                <label class="cursor-pointer">
                  <input type="checkbox" class="peer sr-only">
                  <div class="px-3 py-1.5 rounded-lg border border-slate-200 text-sm text-slate-600 peer-checked:bg-emerald-50 peer-checked:border-emerald-500 peer-checked:text-emerald-700 transition-colors">👶 儿童</div>
                </label>
                <label class="cursor-pointer">
                  <input type="checkbox" class="peer sr-only">
                  <div class="px-3 py-1.5 rounded-lg border border-slate-200 text-sm text-slate-600 peer-checked:bg-emerald-50 peer-checked:border-emerald-500 peer-checked:text-emerald-700 transition-colors">🤰 孕妇</div>
                </label>
                <label class="cursor-pointer">
                  <input type="checkbox" class="peer sr-only" checked>
                  <div class="px-3 py-1.5 rounded-lg border border-slate-200 text-sm text-slate-600 peer-checked:bg-emerald-50 peer-checked:border-emerald-500 peer-checked:text-emerald-700 transition-colors">👴 老年人</div>
                </label>
                <label class="cursor-pointer">
                  <input type="checkbox" class="peer sr-only">
                  <div class="px-3 py-1.5 rounded-lg border border-slate-200 text-sm text-slate-600 peer-checked:bg-emerald-50 peer-checked:border-emerald-500 peer-checked:text-emerald-700 transition-colors">🏃 健身/减脂</div>
                </label>
              </div>
            </div>

            <!-- Health Concerns -->
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-2">特殊健康关注 (可选)</label>
              <select class="w-full bg-slate-50 border border-slate-200 text-slate-700 text-sm rounded-lg focus:ring-emerald-500 focus:border-emerald-500 block p-2.5">
                <option value="">无特殊疾病要求</option>
                <option value="diabetes">糖尿病 / 控糖需求</option>
                <option value="hypertension" selected>高血压 / 控钠需求</option>
                <option value="gout">高尿酸 / 痛风</option>
              </select>
            </div>
          </div>
        </div>

        <!-- Action Button -->
        <a href="analyzing.html" class="w-full py-4 bg-emerald-500 hover:bg-emerald-600 text-white rounded-2xl font-bold text-lg shadow-lg shadow-emerald-500/30 transition-all flex items-center justify-center gap-2 group">
          开始智能分析
          <svg class="w-5 h-5 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
        </a>

        <!-- Tips -->
        <div class="bg-blue-50 text-blue-800 text-xs rounded-xl p-4 border border-blue-100 flex items-start gap-2">
          <svg class="w-4 h-4 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          <p>分析过程大约需要 5-10 秒，系统将调用大模型结合专业数据库对配料进行深度比对，请耐心等待。</p>
        </div>

      </div>
    </div>
  </main>

</body>
</html>
